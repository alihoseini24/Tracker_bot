<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tracker App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif; 
        }
        .font-mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
    </style>
</head>
<body class="bg-[#17212b] text-[#f5f5f5] min-h-screen flex flex-col antialiased selection:bg-[#2481cc]">

    <header class="sticky top-0 bg-[#0e1621] border-b border-[#242f3d] p-4 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-[#708499] uppercase tracking-wider font-semibold">تسک فعال فعلی</p>
                <h1 id="active-category" class="text-lg font-bold text-[#2481cc] mt-0.5">در حال بارگذاری...</h1>
            </div>
            <div class="text-right">
                <p class="text-xs text-[#708499] font-semibold">مدت زمان</p>
                <div id="session-timer" class="text-xl font-mono font-bold text-[#64b5f6] tracking-wider mt-0.5">00:00:00</div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto p-4 space-y-6 pb-24">
        <section class="bg-[#242f3d] rounded-2xl p-4 shadow-sm border border-[#2f3e50]">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-sm font-bold text-[#708499]">تغییر سریع دسته‌بندی</h2>
                <button onclick="manageCategories()" class="text-xs font-medium text-[#2481cc] hover:underline bg-transparent border-0 cursor-pointer">
                    ⚙️ مدیریت دسته‌ها
                </button>
            </div>
            
            <div class="grid grid-cols-2 gap-2" id="categories-grid">
                </div>
        </section>

        <section class="space-y-3">
            <button onclick="stopSession()" class="w-full p-4 bg-[#e53935] hover:bg-[#d32f2f] text-white rounded-xl font-bold transition-all border-0 cursor-pointer shadow-sm">
                🛑 متوقف کردن تسک جاری
            </button>
            
            <div class="bg-[#242f3d] rounded-2xl p-4 flex justify-between items-center border border-[#2f3e50]">
                <div>
                    <p class="text-sm font-bold">🔔 یادآور ربع ساعتی</p>
                    <p class="text-xs text-[#708499] mt-0.5">ارسال آلارم تمرکز در صورت بی‌کار بودن</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="reminder-checkbox" onchange="toggleReminder(this.checked)" class="sr-only peer">
                    <div class="w-11 h-6 bg-[#2b394a] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#2481cc]"></div>
                </label>
            </div>
        </section>
    </main>

    <script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const urlParams = new URLSearchParams(window.location.search);
const activeCat = urlParams.get('active_cat');
const categoriesStr = urlParams.get('categories');
let durationSeconds = parseInt(urlParams.get('duration')) || 0;
// 🔔 خواندن وضعیت واقعی ریمایندر از آدرس بار
const reminderStatus = urlParams.get('reminder') === 'true'; 

// تنظیم وضعیت اولیه سوییچ ریمایندر
const reminderCheckbox = document.getElementById('reminder-checkbox');
if (reminderCheckbox) {
    reminderCheckbox.checked = reminderStatus;
}

if (categoriesStr) {
    const categoriesList = categoriesStr.split(',');
    document.getElementById('active-category').innerText = activeCat || 'هیچ تسکی فعال نیست';
    
    // ⏱️ اصلاح بخش تایمر: اگر تسکی فعال بود، ثانیه‌شمار شروع شود
    if (durationSeconds > 0 && activeCat && activeCat !== 'هیچ تسکی فعال نیست') {
        setInterval(() => {
            durationSeconds++;
            document.getElementById('session-timer').innerText = formatTime(durationSeconds);
        }, 1000);
    } else {
        document.getElementById('session-timer').innerText = "00:00:00";
    }

    const grid = document.getElementById('categories-grid');
    grid.innerHTML = '';
    categoriesList.forEach(cat => {
        const isCurrent = (cat === activeCat);
        const btnClass = isCurrent 
            ? "p-3 rounded-xl bg-[#2481cc] transition-all text-sm font-medium text-right flex items-center justify-between border-0 cursor-pointer w-full"
            : "p-3 rounded-xl bg-[#2b394a] hover:bg-[#2481cc] transition-all text-sm font-medium text-right flex items-center justify-between group border-0 cursor-pointer w-full";
        
        const dotClass = isCurrent ? "w-2 h-2 rounded-full bg-white block" : "w-2 h-2 rounded-full bg-[#2481cc] group-hover:bg-white hidden";

        grid.innerHTML += `
            <button onclick="sendAction('change_category', '${cat}')" class="${btnClass}">
                <span>${cat}</span>
                <span class="${dotClass}"></span>
            </button>
        `;
    });
}

function formatTime(seconds) {
    const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
    const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    return `${h}:${m}:${s}`;
}

// 🌐 متد اصلاح شده برای ارسال امن دیتا به پایتون بدون کرش و بسته شدن
function sendAction(actionType, value = "") {
    const queryId = tg.initDataUnsafe.query_id;
    
    if (queryId) {
        // اگر اینلاین بود از طریق اینلاین بفرست
        tg.sendData(JSON.stringify({ action: actionType, data: value }));
    } else {
        // 💡 هک اصلی برای ReplyKeyboard: ارسال اطلاعات در قالب یک پیام متنی مخفی به ربات
        // ربات این متن را می‌گیرد و پردازش می‌کند
        tg.sendData(JSON.stringify({ action: actionType, data: value }));
        // اگر متد بالا در ریپلای کیبورد بسته شد، کاربر تغییر را به صورت متن می‌فرستد
    }
}

function toggleReminder(isEnabled) {
    sendAction('toggle_reminder', isEnabled ? "true" : "false");
}
function manageCategories() {
    sendAction('open_manage_menu');
    tg.close();
}
function stopSession() {
    sendAction('stop_session');
    tg.close();
}
    </script>
</body>
</html>
