<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-[#121212] dark:text-gray-100 min-h-screen p-4 md:p-8 transition-colors duration-200">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <div class="grid grid-cols-2 gap-4 bg-gray-50 dark:bg-[#1e1e1e] border border-gray-200 dark:border-[#2d2d2d] rounded-2xl p-4 shadow-sm text-center">
            <div class="border-r border-gray-200 dark:border-[#2d2d2d] last:border-0">
                <p class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider">Workday End (17:00)</p>
                <p id="countdown-work" class="text-xl font-bold font-mono text-indigo-600 dark:text-indigo-400 mt-1">00:00:00</p>
            </div>
            <div>
                <p class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider">Day End (00:00)</p>
                <p id="countdown-day" class="text-xl font-bold font-mono text-amber-600 dark:text-amber-400 mt-1">00:00:00</p>
            </div>
        </div>
        
        <div class="bg-gray-50 dark:bg-[#1e1e1e] border border-gray-200 dark:border-[#2d2d2d] rounded-2xl p-6 shadow-sm relative">
            <button onclick="toggleTheme()" class="absolute top-6 right-6 p-2 rounded-xl bg-gray-100 dark:bg-[#2d2d2d] text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-[#3d3d3d] transition" aria-label="Toggle Theme">
                <svg id="theme-icon-dark" class="hidden dark:block w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-3.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M6.343 6.343l.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"/></svg>
                <svg id="theme-icon-light" class="block dark:hidden w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            </button>

            <div class="text-center space-y-4">
                <div>
                    <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400">Focus Dashboard</h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Monitor and manage user activities directly</p>
                </div>
                
                <div class="flex flex-col sm:flex-row items-center justify-center gap-3 bg-white dark:bg-[#121212] p-3 rounded-xl border border-gray-200 dark:border-[#2d2d2d]">
                    <label for="user-selector" class="text-sm font-medium text-gray-500 dark:text-gray-400">Active User:</label>
                    <select id="user-selector" onchange="handleUserChange()" class="bg-gray-50 dark:bg-[#1e1e1e] text-gray-900 dark:text-white border border-gray-200 dark:border-[#2d2d2d] rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-indigo-500 w-full sm:w-64">
                        <option value="">Loading users...</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 dark:bg-[#1e1e1e] border border-gray-200 dark:border-[#2d2d2d] rounded-2xl p-6 shadow-sm">
            <h2 class="text-md font-bold text-gray-700 dark:text-gray-300 mb-4 flex items-center gap-2">
                <span class="flex h-2.5 w-2.5 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                </span>
                Current Session
            </h2>
            <div id="active-task-container" class="bg-white dark:bg-[#121212] rounded-xl p-4 border border-gray-200 dark:border-[#2d2d2d] text-center">
                <p id="active-task-status" class="text-base font-medium text-gray-400">Please select a user first.</p>
                <div id="active-task-actions" class="mt-4 flex justify-center gap-3 hidden">
                    <button onclick="cancelActiveTask()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-1.5 rounded-lg text-xs font-semibold transition shadow-sm">❌ Cancel Task</button>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 dark:bg-[#1e1e1e] border border-gray-200 dark:border-[#2d2d2d] rounded-2xl p-6 shadow-sm">
            <h2 class="text-md font-bold text-gray-700 dark:text-gray-300 mb-4">Start New Task</h2>
            <div id="categories-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                </div>
        </div>

        <div class="bg-gray-50 dark:bg-[#1e1e1e] border border-gray-200 dark:border-[#2d2d2d] rounded-2xl p-6 shadow-sm">
            <h2 class="text-md font-bold text-gray-700 dark:text-gray-300 mb-4 flex items-center gap-2">Performance Metrics</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="bg-white dark:bg-[#121212] border border-gray-200 dark:border-[#2d2d2d] rounded-xl p-4 space-y-2">
                    <div class="text-xs font-bold text-indigo-500 uppercase tracking-wider">Today</div>
                    <div id="report-day" class="text-xs text-gray-600 dark:text-gray-300 space-y-1">Select user...</div>
                </div>
                <div class="bg-white dark:bg-[#121212] border border-gray-200 dark:border-[#2d2d2d] rounded-xl p-4 space-y-2">
                    <div class="text-xs font-bold text-green-500 uppercase tracking-wider">Last 7 Days</div>
                    <div id="report-week" class="text-xs text-gray-600 dark:text-gray-300 space-y-1">Select user...</div>
                </div>
                <div class="bg-white dark:bg-[#121212] border border-gray-200 dark:border-[#2d2d2d] rounded-xl p-4 space-y-2">
                    <div class="text-xs font-bold text-amber-500 uppercase tracking-wider">Last 30 Days</div>
                    <div id="report-month" class="text-xs text-gray-600 dark:text-gray-300 space-y-1">Select user...</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://usvegeoutoudjxbsfdov.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_eyRouLDdaSGBOhxlbGezow_jhYlAPEO";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let CURRENT_USER_ID = null;
        let CURRENT_CHAT_ID = null;
        let autoRefreshTimer = null;
        let countdownTimer = null;

        document.addEventListener("DOMContentLoaded", () => {
            loadUsersDropdown();
            startCountdowns();
        });

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }

        async function loadUsersDropdown() {
            const selector = document.getElementById("user-selector");
            try {
                const { data: users, error } = await supabaseClient
                    .from('users')
                    .select('user_id, chat_id, user_name');

                if (error) throw error;
                selector.innerHTML = "";

                if (users && users.length > 0) {
                    users.forEach(u => {
                        const opt = document.createElement("option");
                        opt.value = u.user_id;
                        opt.dataset.chatId = u.chat_id || u.user_id;
                        opt.innerText = `${u.user_name || 'Unknown'} (${u.user_id})`;
                        selector.appendChild(opt);
                    });
                    selector.selectedIndex = 0;
                    handleUserChange();
                } else {
                    selector.innerHTML = "<option value=''>No users found</option>";
                }
            } catch (err) {
                console.error(err);
                selector.innerHTML = "<option value=''>❌ Error loading users</option>";
            }
        }

        function handleUserChange() {
            const selector = document.getElementById("user-selector");
            if (!selector.value) return;

            const selectedOption = selector.options[selector.selectedIndex];
            CURRENT_USER_ID = parseInt(selector.value);
            CURRENT_CHAT_ID = parseInt(selectedOption.dataset.chatId);

            refreshDashboardData();
        }

        async function loadActiveSession() {
            if (!CURRENT_USER_ID) return;
            const container = document.getElementById("active-task-status");
            const actions = document.getElementById("active-task-actions");

            try {
                const { data, error } = await supabaseClient
                    .from('activities')
                    .select('*')
                    .eq('user_id', CURRENT_USER_ID)
                    .is('end_time', null)
                    .order('id', { ascending: false })
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    const current = data[0];
                    const startTime = new Date(current.start_time + "Z");
                    const diffMins = Math.floor((new Date() - startTime) / 60000);
                    
                    container.innerText = `${current.category}\n${diffMins < 0 ? 0 : diffMins}m`;
                    container.className = "text-base font-bold text-indigo-600 dark:text-indigo-400";
                    actions.classList.remove("hidden");
                } else {
                    container.innerText = "💤 Idle. No active task found.";
                    container.className = "text-base font-medium text-gray-400";
                    actions.classList.add("hidden");
                }
            } catch (err) {
                console.error(err);
                container.innerText = "❌ Connection error";
            }
        }

        async function loadCategories() {
            if (!CURRENT_USER_ID) return;
            const grid = document.getElementById("categories-grid");
            
            try {
                const { data, error } = await supabaseClient
                    .from('categories')
                    .select('category')
                    .eq('user_id', CURRENT_USER_ID);

                if (error) throw error;
                grid.innerHTML = "";
                
                const defaultCats = ["Study", "Meal", "Snack", "Grocery", "Movie/Series", "Commute", "Exercises", "Sleep"];
                const cats = (data && data.length > 0) ? data.map(r => r.category) : defaultCats;

                cats.forEach(cat => {
                    const btn = document.createElement("button");
                    btn.className = "bg-white dark:bg-[#121212] border border-gray-200 dark:border-[#2d2d2d] hover:bg-indigo-500 dark:hover:bg-indigo-600 hover:text-white text-gray-800 dark:text-gray-200 p-2.5 rounded-xl text-xs font-medium transition text-center truncate shadow-sm";
                    btn.innerText = cat;
                    btn.onclick = () => startNewTask(cat);
                    grid.appendChild(btn);
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function loadStatsReports() {
            if (!CURRENT_USER_ID) return;

            const dayDiv = document.getElementById("report-day");
            const weekDiv = document.getElementById("report-week");
            const monthDiv = document.getElementById("report-month");

            const now = new Date();
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
            const startOfWeek = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000).toISOString();
            const startOfMonth = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000).toISOString();

            try {
                const { data: activities, error } = await supabaseClient
                    .from('activities')
                    .select('category, start_time, duration_minutes')
                    .eq('user_id', CURRENT_USER_ID)
                    .not('duration_minutes', 'is', null)
                    .gte('start_time', startOfMonth);

                if (error) throw error;

                const processReport = (filteredActs) => {
                    const summary = {};
                    filteredActs.forEach(act => {
                        summary[act.category] = (summary[act.category] || 0) + act.duration_minutes;
                    });
                    
                    const keys = Object.keys(summary);
                    if (keys.length === 0) return "<span class='text-gray-400 text-xs'>No data logged</span>";
                    
                    return keys.map(cat => {
                        const h = Math.floor(summary[cat] / 60);
                        const m = summary[cat] % 60;
                        return `<div class="flex justify-between border-b border-gray-100 dark:border-[#2d2d2d] py-0.5 text-xs"><span>• ${cat}</span><span class="font-bold text-gray-500 dark:text-gray-400">${h > 0 ? h+'h '+m+'m' : m+'m'}</span></div>`;
                    }).join('');
                };

                dayDiv.innerHTML = processReport(activities.filter(a => a.start_time >= startOfDay));
                weekDiv.innerHTML = processReport(activities.filter(a => a.start_time >= startOfWeek));
                monthDiv.innerHTML = processReport(activities);

            } catch (err) {
                console.error(err);
            }
        }

        async function startNewTask(category) {
            if (!CURRENT_USER_ID) return;
            const now = new Date().toISOString();
            
            try {
                const { data: activeTasks } = await supabaseClient
                    .from('activities')
                    .select('id, start_time')
                    .eq('user_id', CURRENT_USER_ID)
                    .is('end_time', null);

                if (activeTasks && activeTasks.length > 0) {
                    for (const task of activeTasks) {
                        const duration = Math.floor((new Date() - new Date(task.start_time)) / 60000);
                        await supabaseClient
                            .from('activities')
                            .update({ end_time: now, duration_minutes: duration })
                            .eq('id', task.id);
                    }
                }

                await supabaseClient
                    .from('activities')
                    .insert([{ user_id: CURRENT_USER_ID, chat_id: CURRENT_CHAT_ID, category: category, start_time: now }]);

                refreshDashboardData();
            } catch (err) {
                console.error(err);
            }
        }

        async function cancelActiveTask() {
            if (!CURRENT_USER_ID) return;
            try {
                await supabaseClient
                    .from('activities')
                    .delete()
                    .eq('user_id', CURRENT_USER_ID)
                    .is('end_time', null);

                refreshDashboardData();
            } catch (err) {
                console.error(err);
            }
        }

        // ⏱️ High-Efficiency Countdown Logic
        function updateCountdowns() {
            const now = new Date();
            
            // 1. Workday Countdown (Until 17:00:00)
            const workEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 17, 0, 0);
            let workDiff = workEnd - now;
            if (workDiff < 0) workDiff = 0; // If past 17:00, freeze at 0
            
            // 2. Day Countdown (Until Midnight 24:00)
            const dayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
            let dayDiff = dayEnd - now;

            const formatTime = (ms) => {
                const totalSecs = Math.floor(ms / 1000);
                const hrs = String(Math.floor(totalSecs / 3600)).padStart(2, '0');
                const mins = String(Math.floor((totalSecs % 3600) / 60)).padStart(2, '0');
                const secs = String(totalSecs % 60).padStart(2, '0');
                return `${hrs}:${mins}:${secs}`;
            }

            document.getElementById("countdown-work").innerText = formatTime(workDiff);
            document.getElementById("countdown-day").innerText = formatTime(dayDiff);
        }

        function startCountdowns() {
            if (countdownTimer) return;
            updateCountdowns();
            countdownTimer = setInterval(updateCountdowns, 1000);
        }

        function stopCountdowns() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        function refreshDashboardData() {
            loadActiveSession();
            loadCategories();
            loadStatsReports();
        }

        // Smart Battery Management
        function startSmartRefresh() {
            if (autoRefreshTimer) return;
            autoRefreshTimer = setInterval(() => {
                if (document.visibilityState === 'visible') refreshDashboardData();
            }, 60000);
        }

        function stopSmartRefresh() {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                refreshDashboardData();
                startSmartRefresh();
                startCountdowns();
            } else {
                stopSmartRefresh();
                stopCountdowns(); // Completely freezes engine processing when tab is hidden
            }
        });

        startSmartRefresh();
    </script>
</body>
</html>
